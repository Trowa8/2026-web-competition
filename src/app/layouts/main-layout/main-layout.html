<header class="header">
    <div class="container">
        <div class="logo">
            <h1>🏆 TournamentHub</h1>
        </div>
        <nav class="nav">
            <a routerLink="/tournaments" routerLinkActive="active">Турніри</a>
            <ng-container *ngIf="authService.isAuthenticated(); else authLinks">
                <span class="user-name">{{ authService.getUser()?.name }}</span>
                <button class="btn-logout" (click)="logout()">Вийти</button>
            </ng-container>
            <ng-template #authLinks>
                <a routerLink="/login" routerLinkActive="active">Увійти</a>
                <a routerLink="/register" routerLinkActive="active">Реєстрація</a>
            </ng-template>
        </nav>
    </div>
</header>

<main>
    <router-outlet></router-outlet>
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 TournamentHub. Всі права захищені.</p>
    </div>
</footer>
