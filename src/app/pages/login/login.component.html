<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Ласкаво просимо!</h2>
            <p>Увійдіть у свій акаунт</p>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="credentials.email" required email
                    #email="ngModel" class="form-control" placeholder="your@email.com" />
                <div class="error-message" *ngIf="email.invalid && email.touched">
                    Введіть коректний email
                </div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required
                    minlength="6" #password="ngModel" class="form-control" placeholder="********" />
                <div class="error-message" *ngIf="password.invalid && password.touched">
                    Пароль має бути не менше 6 символів
                </div>
            </div>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-login">
                {{ isLoading ? 'Завантаження...' : 'Увійти' }}
            </button>
        </form>

        <div class="register-link">
            <p>Немає акаунту? <a routerLink="/register">Зареєструватися</a></p>
        </div>
    </div>
</div>
