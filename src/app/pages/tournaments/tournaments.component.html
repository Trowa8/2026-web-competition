<app-main-layout>
    <div style="padding: 2rem;">
        <h1>Турніри</h1>

        <div *ngIf="isLoading" style="text-align: center; padding: 2rem;">
            Завантаження...
        </div>

        <div *ngIf="errorMessage" style="color: red; text-align: center;">
            {{ errorMessage }}
        </div>

        <div *ngIf="!isLoading && tournaments.length === 0" style="text-align: center; padding: 2rem;">
            <p>Немає турнірів</p>
        </div>

        <div *ngFor="let tournament of tournaments"
            style="border: 1px solid #ccc; margin: 1rem; padding: 1rem; border-radius: 8px;">
            <h3>{{ tournament.name }}</h3>
            <p>Гра: {{ tournament.game }}</p>
            <p>Статус: {{ tournament.status }}</p>
            <p>Гравці: {{ tournament.currentPlayers }}/{{ tournament.maxPlayers }}</p>
            <button (click)="joinTournament(tournament.id)" [disabled]="tournament.status !== 'upcoming'">
                Приєднатися
            </button>
        </div>
    </div>
</app-main-layout>
