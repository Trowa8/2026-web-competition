<div class="container">
    <h1>Турніри</h1>
    <div class="search-box">
        <input type="text" [(ngModel)]="searchText" placeholder="Пошук..." />
        <button class="create-btn">+ Створити</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Назва</th>
                    <th>Статус</th>
                    <th>Дата</th>
                    <th>Команди</th>
                    <th>Приз</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody>
                @for (t of filteredList; track t.id) {
                <tr>
                    <td>{{ t.name }}</td>
                    <td>{{ getStatusText(t.status) }}</td>
                    <td>{{ t.date }}</td>
                    <td>{{ t.teams }}</td>
                    <td>{{ t.prize }}</td>
                    <td><button>Детальніше</button></td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
