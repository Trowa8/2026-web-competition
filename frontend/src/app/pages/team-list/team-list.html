<div class="teams-container">
    <div class="page-header">
        <h1>Команди</h1>
        <p>Створюйте та керуйте кіберспортивними командами</p>
    </div>

    <div class="controls-bar">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Пошук команд..." />
        </div>
        <button class="btn-create">+ Створити команду</button>
    </div>

    <div class="teams-grid">
        <div class="team-card">
            <div class="team-avatar">👥</div>
            <h3>Team Alpha</h3>
            <p>Професійна кіберспортивна команда</p>
            <div class="team-stats">
                <span>5 учасників</span>
                <span>2 турніри</span>
            </div>
            <button class="btn-details">Детальніше</button>
        </div>

        <div class="team-card">
            <div class="team-avatar">👥</div>
            <h3>Team Beta</h3>
            <p>Аматорська команда новачків</p>
            <div class="team-stats">
                <span>4 учасники</span>
                <span>1 турнір</span>
            </div>
            <button class="btn-details">Детальніше</button>
        </div>

        <div class="team-card">
            <div class="team-avatar">👥</div>
            <h3>Team Gamma</h3>
            <p>Досвідчена команда ветеранів</p>
            <div class="team-stats">
                <span>6 учасників</span>
                <span>5 турнірів</span>
            </div>
            <button class="btn-details">Детальніше</button>
        </div>
    </div>
</div>
