<div class="container">
    <h1>Турніри</h1>

    <div class="search-box">
        <input type="text" [value]="searchTerm()" (input)="onSearch($any($event.target).value)"
            placeholder="Пошук..." />
        <button class="create-btn">+ Створити</button>
    </div>

    @if (isLoading()) {
    <div class="loading">Завантаження...</div>
    } @else {
    <table>
        <thead>
            <tr>
                <th>Назва</th>
                <th>Статус</th>
                <th>Команди</th>
                <th>Дії</th>
            </tr>
        </thead>
        <tbody>
            @for (t of filteredTournaments(); track t.id) {
            <tr>
                <td>{{ t.name }}</td>
                <td>{{ t.status }}</td>
                <td>{{ t.registeredTeams }}/{{ t.maxTeams }}</td>
                <td><button>Детальніше</button></td>
            </tr>
            }
        </tbody>
    </table>
    }
</div>
