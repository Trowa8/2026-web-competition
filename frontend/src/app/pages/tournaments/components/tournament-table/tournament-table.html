<div class="table-wrapper">
    <table class="tournaments-table">
        <thead>
            <tr>
                <th>Назва турніру</th>
                <th>Статус</th>
                <th>Команди</th>
                <th>Дії</th>
            </tr>
        </thead>
        <tbody>
            @for (t of tournaments; track t.id) {
            <tr class="tournament-row">
                <td class="tournament-name">{{ t.name }}</td>
                <td><span class="status-badge">{{ getStatusText(t.status) }}</span></td>
                <td>{{ t.registeredTeams }}/{{ t.maxTeams }}</td>
                <td><button class="btn-delete">Видалити</button></td>
            </tr>
            }
        </tbody>
    </table>
</div>
