<app-auth-layout>
    <div class="create-container">
        <div class="create-card">
            <h1>➕ Створити турнір</h1>

            <form (ngSubmit)="onSubmit()" #form="ngForm">
                <div class="form-group">
                    <label>Назва турніру</label>
                    <input type="text" [(ngModel)]="tournament.name" name="name" required class="form-control"
                        placeholder="Cyber Cup 2024">
                </div>

                <div class="form-group">
                    <label>Гра</label>
                    <input type="text" [(ngModel)]="tournament.game" name="game" required class="form-control"
                        placeholder="Counter-Strike 2">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Дата початку</label>
                        <input type="date" [(ngModel)]="tournament.startDate" name="startDate" required
                            class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Дата завершення</label>
                        <input type="date" [(ngModel)]="tournament.endDate" name="endDate" required
                            class="form-control">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Максимум гравців</label>
                        <input type="number" [(ngModel)]="tournament.maxPlayers" name="maxPlayers" required min="2"
                            max="64" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Призовий фонд ($)</label>
                        <input type="number" [(ngModel)]="tournament.prizePool" name="prizePool" required min="0"
                            class="form-control">
                    </div>
                </div>

                <div class="form-group">
                    <label>Опис</label>
                    <textarea [(ngModel)]="tournament.description" name="description" rows="4" class="form-control"
                        placeholder="Опис турніру..."></textarea>
                </div>

                @if (errorMessage) {
                <div class="error-message">{{ errorMessage }}</div>
                }

                <div class="form-actions">
                    <button type="button" class="btn-cancel" routerLink="/tournaments">Скасувати</button>
                    <button type="submit" class="btn-submit" [disabled]="form.invalid || isLoading">
                        {{ isLoading ? 'Створення...' : 'Створити турнір' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</app-auth-layout>
