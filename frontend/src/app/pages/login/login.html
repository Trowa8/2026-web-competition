<div class="login-container">
    <div class="login-card">
        <h2>Вхід до системи</h2>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="form-group">
                <label for="username">Ім'я користувача</label>
                <input type="text" id="username" name="username" [(ngModel)]="credentials.username" required
                    placeholder="Введіть ім'я користувача" [disabled]="isLoading()">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required
                    placeholder="Введіть пароль" [disabled]="isLoading()">
            </div>

            <button type="submit" class="login-btn" [disabled]="loginForm.invalid || isLoading()">
                {{ isLoading() ? 'Вхід...' : 'Увійти' }}
            </button>

            @if (errorMessage()) {
            <div class="error-message">
                {{ errorMessage() }}
            </div>
            }
        </form>
    </div>
</div>
