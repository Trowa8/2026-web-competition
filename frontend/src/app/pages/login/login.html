<div class="login-container">
  <div class="login-card">
    <h2>Ласкаво просимо!</h2>
    <p>Увійдіть у свій акаунт</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="credentials.email"
          name="email"
          required
          #email="ngModel"
          class="form-control"
          placeholder="your@email.com"
        />
        @if (email.invalid && email.touched) {
        <div class="error-message">Введіть коректний email</div>
        }
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input
          type="password"
          [(ngModel)]="credentials.password"
          name="password"
          required
          minlength="6"
          #password="ngModel"
          class="form-control"
          placeholder="********"
        />
        @if (password.invalid && password.touched) {
        <div class="error-message">Пароль має бути не менше 6 символів</div>
        }
      </div>

      @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
      }

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-login">
        @if (isLoading) { Завантаження... } @else { Увійти }
      </button>
    </form>
  </div>
</div>
