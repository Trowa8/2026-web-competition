<div class="login-container">
    <div class="login-card">
        <h2>Ласкаво просимо!</h2>
        <p>Увійдіть у свій акаунт</p>

        @if (error) {
        <div class="error-message">{{ error }}</div>
        }

        <form (ngSubmit)="onSubmit(); $event.preventDefault()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" [(ngModel)]="username"
                    [ngModelOptions]="{standalone: true}" placeholder="Введіть ім'я користувача" required />
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" [(ngModel)]="password"
                    [ngModelOptions]="{standalone: true}" placeholder="Введіть пароль" required />
            </div>

            <button type="submit" class="login-btn" [disabled]="isLoading">
                {{ isLoading ? 'Завантаження...' : 'Увійти' }}
            </button>
        </form>

        <div class="demo-info">
            <p>Демо: будь-який логін/пароль</p>
        </div>
    </div>
</div>
