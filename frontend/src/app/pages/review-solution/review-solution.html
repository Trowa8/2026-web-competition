<div class="container">
    <h2>Перевірка рішення</h2>

    <form (ngSubmit)="submit()">
        <div class="form-group">
            <label>ID рішення</label>
            <input type="text" [(ngModel)]="solutionId" name="solutionId" placeholder="Solution ID" />
        </div>

        <div class="form-group">
            <label>Оцінка (0–100)</label>
            <input type="number" [(ngModel)]="score" name="score" min="0" max="100" />
        </div>

        <div class="form-group">
            <label>Коментар</label>
            <textarea [(ngModel)]="comment" name="comment" placeholder="Коментар (необовʼязково)"></textarea>
        </div>

        <button type="submit" [disabled]="isSubmitting()">
            {{ isSubmitting() ? 'Відправка...' : 'Оцінити' }}
        </button>
    </form>
</div>
