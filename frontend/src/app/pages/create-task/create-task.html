<div class="create-task-page">
    <h1>Створити нове завдання</h1>

    <form (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Назва завдання <span class="required">*</span></label>
            <input [(ngModel)]="task.title" placeholder="Наприклад: Розробка фронтенд-частини" required />
        </div>

        <div class="form-group">
            <label>Опис завдання <span class="required">*</span></label>
            <textarea [(ngModel)]="task.description" rows="6"
                placeholder="Детально опишіть вимоги, функціонал та технології..."></textarea>
        </div>

        <div class="form-group">
            <label>Дедлайн <span class="required">*</span></label>
            <input type="datetime-local" [(ngModel)]="task.deadline" required />
        </div>

        <div class="form-group">
            <label>ID турніру <span class="required">*</span></label>
            <input type="number" [(ngModel)]="task.tournamentId" placeholder="Введіть ID турніру" required />
        </div>

        <button type="submit" class="btn-create">Створити завдання</button>
    </form>
</div>
