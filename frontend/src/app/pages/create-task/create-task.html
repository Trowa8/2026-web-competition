<div class="container">
    <h2>Створення таски</h2>

    <form (ngSubmit)="submit()">
        <div class="form-group">
            <label>Назва</label>
            <input type="text" [(ngModel)]="title" name="title" placeholder="Введіть назву таски" />
        </div>

        <div class="form-group">
            <label>Опис</label>
            <textarea [(ngModel)]="description" name="description" placeholder="Введіть опис"></textarea>
        </div>

        <div class="form-group">
            <label>ID турніру</label>
            <input type="text" [(ngModel)]="tournamentId" name="tournamentId" placeholder="Tournament ID" />
        </div>

        <button type="submit" [disabled]="isSubmitting()">
            {{ isSubmitting() ? 'Створення...' : 'Створити' }}
        </button>
    </form>
</div>
