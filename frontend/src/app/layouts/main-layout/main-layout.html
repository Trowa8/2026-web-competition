<div class="layout">
  <header class="header">
    <div class="container">
      <div class="logo">
        <h1>🎮 GameHub</h1>
      </div>
      <nav class="nav">
        <a routerLink="/home" routerLinkActive="active" class="nav-link">Головна</a>
        <a routerLink="/tournaments" routerLinkActive="active" class="nav-link">Турніри</a>
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Увійти</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <ui-checkbox [label]="'Показати турніри'" [checked]="true"></ui-checkbox>
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; {{ currentYear }} GameHub. Всі права захищені.</p>
    </div>
  </footer>
</div>
