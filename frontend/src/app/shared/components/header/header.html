<header class="header">
    <div class="container">
        <div class="logo">
            <a routerLink="/">🏆 Турнірний додаток</a>
        </div>
        <nav class="nav">
            <a routerLink="/tournaments" class="nav-link">Турніри</a>
            @if (isAuthenticated()) {
            <span class="username">{{ user()?.login }}</span>
            <button class="logout-btn" (click)="logout()">Вийти</button>
            } @else {
            <a routerLink="/login" class="nav-link login-link">Вхід</a>
            }
        </nav>
    </div>
</header>
