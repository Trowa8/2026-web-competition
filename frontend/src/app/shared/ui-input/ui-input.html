<div class="input-wrapper" [class]="wrapperClasses()">
  @if (label()) {
    <label class="input-label" [for]="inputId">
      {{ label() }}
      @if (required()) {
        <span class="input-required">*</span>
      }
    </label>
  }
  <div class="input-field-wrapper">
    @if (hasPrefixIcon()) {
      <span class="input-icon input-icon--prefix">
        <i class="fa-solid" [class]="prefixIconClass()"></i>
      </span>
    }

    <input
      #input
      ngDefaultControl
      [id]="inputId"
      class="input-field"
      [type]="showPassword() ? 'text' : type()"
      [placeholder]="placeholder()"
      [required]="required()"
      [attr.aria-required]="required() ? true : null"
      [disabled]="disabled()"
      [value]="value()"
      (input)="handleInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />

    @if (type() === 'password') {
      <button
        type="button"
        class="input-icon input-icon--suffix input-toggle-btn"
        (click)="togglePassword()"
      >
        <i class="fa-solid" [class]="showPassword() ? 'fa-eye-slash' : 'fa-eye'"></i>
      </button>
    }

    @if (currentStatus() !== 'default' && type() !== 'password') {
      <span class="input-icon input-icon--suffix status-icon--{{ currentStatus() }}">
        <i class="fa-solid" [class]="statusIconClass()"></i>
      </span>
    }
  </div>
  @if (error()) {
    <span class="input-hint input-hint--error">
      <i class="fa-solid fa-circle-exclamation"></i>
      {{ error() }}
    </span>
  } @else if (hint()) {
    <span class="input-hint">{{ hint() }}</span>
  }
</div>
