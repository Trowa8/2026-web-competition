<div class="login-container">
  <div class="login-card">
    <h2>Авторизація</h2>
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" required class="form-control">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required class="form-control">
      </div>
      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-primary">
        {{ isLoading ? 'Loading...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
